<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="assets/img/PsicoLogicLogo.png" type="image/png">
        <link rel="stylesheet" href="assets/css/general.css">
        <link rel="stylesheet" href="assets/css/sidebar.css">
        <link rel="stylesheet" href="assets/css/common-components.css">
        <link rel="stylesheet" href="assets/css/tarifas.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
        <title>Mis Tarifas</title>
    </head>
    <body class="app-view">
        <header class="header-app">
            <a href="home.html" class="logo-link">
                <div class="logo-section">
                    <h1 class="nombre-app-texto small">PsicoLogic</h1>
                </div>
            </a>
            <img src="assets/img/PsicoLogicLogo.png" class="header-logo" alt="Logo">
            <div class="user-info">
                <span>
                    Mis Tarifas -
                    <strong class="user-name-dinamico">Cargando...</strong>
                </span>
                <div class="user-menu-container">
                    <img
                        src
                        class="avatar avatar-dinamico"
                        alt="Avatar"
                        id="avatar-click"
                    >
                    <div class="dropdown-panel" id="dropdown-panel">
                        <div class="dropdown-header">
                            <strong class="user-name-dinamico">Cargando...</strong>
                            <span>Psicólogo Colegiado</span>
                        </div>
                        <hr>
                        <a href="perfil.html">
                            <i class="fa-solid fa-user-gear"></i>
                            Mi Cuenta
                        </a>
                        <a href="ayuda.html">
                            <i class="fa-solid fa-circle-question"></i>
                            Ayuda
                        </a>
                    </div>
                </div>
            </div>
        </header>
        <div class="main-layout">
            <aside class="sidebar collapsed" id="sidebar">
                <div class="toggle-btn" id="toggle-sidebar">
                    <i class="fa-solid fa-bars"></i>
                </div>
                <nav class="menu-links">
                    <a href="home.html">
                        <i class="fa-solid fa-house"></i>
                        <span>Inicio</span>
                    </a>
                    <a href="pacientes.html">
                        <i class="fa-solid fa-user-group"></i>
                        <span>Pacientes</span>
                    </a>
                    <a href="citas.html">
                        <i class="fa-solid fa-calendar-days"></i>
                        <span>Citas</span>
                    </a>
                    <a href="estadisticas.html">
                        <i class="fa-solid fa-chart-line"></i>
                        <span>Estadísticas</span>
                    </a>
                </nav>
                <div class="logout-section">
                    <a href="index.html" style="color: #ff7675;">
                        <i class="fa-solid fa-right-from-bracket"></i>
                        <span>Cerrar Sesión</span>
                    </a>
                </div>
            </aside>
            <main class="content">
                <div id="content-loader" class="inner-loader">
                    <img src="assets/img/PsicoLogicLogo.png" class="loader-logo" alt="Logo">
                </div>
                <div class="card">
                    <h2>Gestión de Tarifas</h2>
                    <div class="table-container-scroll">
                        <table class="session-table">
                            <thead>
                                <tr>
                                    <th style="width: 40%; font-weight: 700 !important;">Tipo de Sesión</th>
                                    <th style="width: 30%; font-weight: 700 !important;">Duración</th>
                                    <th style="width: 30%; font-weight: 700 !important;">Precio</th>
                                </tr>
                            </thead>
                            <tbody id="tarifas-table-body">
                                <!-- Las tarifas se cargarán aquí dinámicamente -->
                                <tr>
                                    <td colspan="4" style="text-align:center; padding:20px;">Cargando tarifas...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
        <script src="assets/js/auth-guard.js"></script>
        <script src="assets/js/layout.js"></script>
        <script src="assets/js/tarifas-script.js"></script>
    </body>
</html>
